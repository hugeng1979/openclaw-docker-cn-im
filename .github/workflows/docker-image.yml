name: Build Docker Image

on:
  push:
    paths:
      - 'version.txt'
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: 读取版本号
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: 创建 Git 标签
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: 构建 Docker 镜像（不推送）
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false  # 不推送到仓库
          tags: |
            myapp:${{ steps.version.outputs.version }}
            myapp:latest
          outputs: type=docker,dest=/tmp/myapp.tar  # 导出为 tar 文件
          
      - name: 上传镜像产物
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.version.outputs.version }}
          path: /tmp/myapp.tar
          retention-days: 90  # 保留90天
          
      - name: 输出信息
        run: |
          echo "✅ Docker 镜像构建成功！"
          echo ""
          echo "📦 版本号: ${{ steps.version.outputs.version }}"
          echo ""
          echo "📥 下载方法:"
          echo "1. 进入 Actions -> 选择本次运行 -> 下载 docker-image-${{ steps.version.outputs.version }} 产物"
          echo "2. 解压下载的文件（如果需要）"
          echo "3. 加载镜像: docker load -i myapp.tar"
          echo "4. 运行容器: docker run myapp:${{ steps.version.outputs.version }}"
