name: Build Docker Image

on:
  push:
    paths:
      - 'version.txt'
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: 读取版本号
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: 创建 Git 标签
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: 构建 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64  # 只构建 amd64 架构
          push: false
          tags: |
            myapp:${{ steps.version.outputs.version }}
            myapp:latest
          outputs: type=docker,dest=/tmp/myapp.tar  # 使用 docker 格式
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: 上传镜像产物
        uses: actions/upload-artifact@v4
        with:
          name: myapp-${{ steps.version.outputs.version }}
          path: /tmp/myapp.tar
          retention-days: 90
          
      - name: 输出信息
        run: |
          echo "✅ Docker 镜像构建成功！"
          echo ""
          echo "📦 版本号: ${{ steps.version.outputs.version }}"
          echo "🏗️ 架构: linux/amd64"
          echo "📁 产物名称: myapp-${{ steps.version.outputs.version }}"
          echo ""
          echo "📥 下载和使用方法："
          echo "1. 进入 Actions 页面，找到本次运行"
          echo "2. 下载产物 myapp-${{ steps.version.outputs.version }}"
          echo "3. 解压文件: unzip myapp-${{ steps.version.outputs.version }}.zip"
          echo "4. 加载镜像: docker load -i myapp.tar"
          echo "5. 运行容器: docker run myapp:${{ steps.version.outputs.version }}"
