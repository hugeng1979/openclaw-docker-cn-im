name: Build and Push Docker Image

on:
  push:
    paths:
      - 'version.txt'
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: 读取版本号
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: 创建 Git 标签
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 构建并推送镜像到 GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          
      - name: 输出镜像信息
        run: |
          echo "✅ Docker 镜像构建并推送成功！"
          echo ""
          echo "🔖 版本号: ${{ steps.version.outputs.version }}"
          echo "🏗️ 架构: linux/amd64"
          echo ""
          echo "📦 GHCR 拉取命令:"
          echo "docker pull ${{ env.REGISTRY_GHCR }}/${{ github.repository }}:${{ steps.version.outputs.version }}"
